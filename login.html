<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      height: 100vh;
      display: flex;
    }

    /* ===== 左パネル ===== */
    .left-panel {
      width: 42%;
      background: linear-gradient(160deg, #2196F3 0%, #1565C0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .illustration {
      position: relative;
      width: 280px;
      height: 300px;
    }

    /* ドキュメント（背面） */
    .doc-back {
      position: absolute;
      width: 160px;
      height: 200px;
      background: rgba(255,255,255,0.85);
      border-radius: 6px;
      top: 30px;
      left: 20px;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.15);
    }

    .doc-back::after {
      content: '';
      position: absolute;
      top: 28px;
      left: 16px;
      right: 16px;
      height: 3px;
      background: #bbb;
      box-shadow:
        0 10px 0 #bbb,
        0 20px 0 #bbb,
        0 30px 0 #bbb,
        0 40px 0 #bbb,
        0 50px 0 #bbb,
        0 60px 0 #bbb,
        0 70px 0 #bbb,
        0 80px 0 #bbb,
        0 90px 0 #bbb,
        0 100px 0 #bbb;
    }

    /* ドキュメント（前面） */
    .doc-front {
      position: absolute;
      width: 160px;
      height: 200px;
      background: #fff;
      border-radius: 6px;
      top: 10px;
      left: 55px;
      box-shadow: 2px 4px 16px rgba(0,0,0,0.18);
    }

    .doc-front::after {
      content: '';
      position: absolute;
      top: 28px;
      left: 16px;
      right: 16px;
      height: 3px;
      background: #ccc;
      box-shadow:
        0 10px 0 #ccc,
        0 20px 0 #ccc,
        0 30px 0 #ccc,
        0 40px 0 #ccc,
        0 50px 0 #ccc,
        0 60px 0 #ccc,
        0 70px 0 #ccc,
        0 80px 0 #ccc,
        0 90px 0 #ccc,
        0 100px 0 #ccc,
        0 110px 0 #ccc,
        0 120px 0 #ccc;
    }

    /* チャットバブル */
    .chat-bubble {
      position: absolute;
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      gap: 6px;
      align-items: center;
      box-shadow: 2px 4px 12px rgba(0,0,0,0.15);
    }

    .chat-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 14px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 0px solid transparent;
      border-top: 9px solid #fff;
    }

    .chat-bubble.bubble1 {
      top: 20px;
      right: 10px;
    }

    .chat-bubble.bubble2 {
      top: 110px;
      right: 0px;
    }

    .chat-bubble.bubble3 {
      top: 200px;
      right: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot-blue  { background: #2196F3; }
    .dot-orange{ background: #E67E22; }
    .dot-gray  { background: #aaa; }

    /* ギアアイコン */
    .gear {
      position: absolute;
      bottom: 30px;
      left: 10px;
      width: 60px;
      height: 60px;
      opacity: 0.5;
    }

    .gear svg {
      width: 100%;
      height: 100%;
      fill: rgba(255,255,255,0.7);
    }

    /* ペン */
    .pen {
      position: absolute;
      bottom: 50px;
      left: 35px;
      width: 6px;
      height: 90px;
      background: linear-gradient(to bottom, #ccc 70%, #555 100%);
      border-radius: 2px 2px 0 0;
      transform: rotate(-35deg);
      transform-origin: bottom center;
    }

    /* ===== 右パネル ===== */
    .right-panel {
      width: 58%;
      background: linear-gradient(160deg, #e8f4fd 0%, #f0f8ff 50%, #ddeeff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 100%;
      max-width: 440px;
      padding: 0 40px;
    }

    .login-title {
      font-size: 28px;
      font-weight: 400;
      color: #222;
      text-align: center;
      margin-bottom: 48px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      font-size: 16px;
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 42px;
      border: 1.5px solid #c8d8e8;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
      background: rgba(255,255,255,0.7);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input::placeholder {
      color: #aaa;
    }

    .form-input:focus {
      border-color: #2196F3;
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: #2176CC;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: #1a65b8;
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #2196F3;
      font-size: 14px;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .divider {
      border: none;
      border-top: 1px solid #c8d8e8;
      margin: 32px 0 24px;
    }

    .register-text {
      text-align: center;
      font-size: 13px;
      color: #555;
      margin-bottom: 20px;
    }

    .btn-register {
      width: 100%;
      padding: 16px;
      background: #2176CC;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-register:hover {
      background: #1a65b8;
    }
  </style>
</head>
<body>

  <!-- 左パネル：イラスト -->
  <div class="left-panel">
    <div class="illustration">

      <!-- ドキュメント背面 -->
      <div class="doc-back"></div>
      <!-- ドキュメント前面 -->
      <div class="doc-front"></div>

      <!-- チャットバブル1（青ドット） -->
      <div class="chat-bubble bubble1">
        <span class="dot dot-blue"></span>
        <span class="dot dot-blue"></span>
        <span class="dot dot-blue"></span>
      </div>

      <!-- チャットバブル2（オレンジドット） -->
      <div class="chat-bubble bubble2">
        <span class="dot dot-orange"></span>
        <span class="dot dot-orange"></span>
        <span class="dot dot-orange"></span>
      </div>

      <!-- チャットバブル3（グレードット） -->
      <div class="chat-bubble bubble3">
        <span class="dot dot-gray"></span>
        <span class="dot dot-gray"></span>
        <span class="dot dot-gray"></span>
      </div>

      <!-- ギア -->
      <div class="gear">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1.08s.03.74.07 1.08L2.46 14.79c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.58 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63z"/>
        </svg>
      </div>

      <!-- ペン -->
      <div class="pen"></div>

    </div>
  </div>

  <!-- 右パネル：ログインフォーム -->
  <div class="right-panel">
    <div class="login-box">
      <h1 class="login-title">ログイン</h1>

      <div class="input-group">
        <span class="input-icon">✉</span>
        <input type="email" class="form-input" placeholder="メールアドレス">
      </div>

      <div class="input-group">
        <span class="input-icon">🔑</span>
        <input type="password" class="form-input" placeholder="パスワード">
      </div>

      <button class="btn-login">ログイン</button>

      <a href="#" class="forgot-link">パスワードを忘れた方はこちら</a>

      <hr class="divider">

      <p class="register-text">アカウントをお持ちではない場合はこちらから</p>

      <button class="btn-register">新規会員登録</button>
    </div>
  </div>

</body>
</html>
